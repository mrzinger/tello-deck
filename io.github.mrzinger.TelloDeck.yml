id: io.github.mrzinger.TelloDeck
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: tello

finish-args:
  # The application receives control and video data from the drone over UDP.
  - --share=network
  # Prefer native Wayland while retaining XWayland support for Gaming Mode.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # SDL reads Steam Input's virtual controller from the host input devices.
  - --device=all
  # Recordings are saved in the user's Videos directory.
  - --filesystem=xdg-videos

modules:
  - name: sdl2
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --enable-shared
      - --disable-audio
      - --disable-video
      - --disable-render
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/cmake
      - '*.la'
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        commit: 5d249570393f7a37e037abf22cd6012a4cc56a71

  # The app invokes the ffmpeg CLI when recording. Build a deliberately small
  # copy containing only the raw-H.264-to-MP4 stream-copy functionality used by
  # Tello Deck, instead of depending on packages installed on SteamOS.
  - name: ffmpeg
    buildsystem: autotools
    config-opts:
      - --disable-autodetect
      - --disable-doc
      - --disable-debug
      - --disable-everything
      - --enable-ffmpeg
      - --enable-network
      - --enable-protocol=file
      - --enable-protocol=udp
      - --enable-demuxer=h264
      - --enable-muxer=mp4
      - --enable-parser=h264
    cleanup:
      - /include
      - /lib/pkgconfig
      - '*.a'
      - '*.la'
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz
        sha256: 464beb5e7bf0c311e68b45ae2f04e9cc2af88851abb4082231742a74d97b524c

  - name: tello-deck
    buildsystem: simple
    build-commands:
      - make
      - make PREFIX=/app install
    sources:
      - type: dir
        path: .
